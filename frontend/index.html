<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Auth System - Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .section { margin: 20px 0; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        input { padding: 8px; margin: 5px; width: 200px; }
        button { padding: 8px 16px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 10px; padding: 10px; background: #f0f0f0; white-space: pre-wrap; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        h2 { margin-top: 0; }
    </style>
</head>
<body>
    <h1>Quantum Auth System</h1>

    <!-- REGISTER -->
    <div class="section">
        <h2>1. Register</h2>
        <input type="text" id="regUsername" placeholder="Username">
        <input type="text" id="regName" placeholder="Name">
        <input type="text" id="regGender" placeholder="Gender">
        <input type="text" id="regMobile" placeholder="Mobile">
        <button onclick="register()">Register</button>
        <div id="regResult" class="result"></div>
    </div>

    <!-- LOGIN -->
    <div class="section">
        <h2>2. Login (Get Challenge)</h2>
        <input type="text" id="loginUsername" placeholder="Username">
        <button onclick="login()">Login</button>
        <div id="loginResult" class="result"></div>
    </div>

    <!-- VERIFY -->
    <div class="section">
        <h2>3. Verify (Sign Challenge)</h2>
        <input type="text" id="verifyUsername" placeholder="Username">
        <input type="text" id="verifyMessage" placeholder="Challenge" readonly>
        <input type="text" id="verifySignature" placeholder="Signature" readonly>
        <button onclick="verify()">Verify</button>
        <div id="verifyResult" class="result"></div>
    </div>

    <!-- STORED DATA -->
    <div class="section">
        <h2>Stored Credentials</h2>
        <div id="storedData" class="result"></div>
    </div>

    <script>
        // Store credentials in memory
        let storedSecretKey = null;
        let storedPublicKey = null;
        let currentChallenge = null;

        // SHA256 using CryptoJS (same as backend)
        function sha256(message) {
            return CryptoJS.SHA256(message).toString();
        }

        // Register function
        async function register() {
            const username = document.getElementById('regUsername').value;
            const name = document.getElementById('regName').value;
            const gender = document.getElementById('regGender').value;
            const mobile = document.getElementById('regMobile').value;

            if (!username) {
                document.getElementById('regResult').innerHTML = '<span class="error">Username required</span>';
                return;
            }

            try {
                const response = await fetch('http://127.0.0.1:5000/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, name, gender, mobile })
                });
                const data = await response.json();

                if (response.ok) {
                    // Store credentials
                    storedSecretKey = data.secret_key;
                    storedPublicKey = data.public_key;
                    
                    document.getElementById('regResult').innerHTML = 
                        '<span class="success">Registered!</span>\n' +
                        'Secret Key: ' + storedSecretKey + '\n' +
                        'Public Key: ' + storedPublicKey;
                    
                    updateStoredData();
                } else {
                    document.getElementById('regResult').innerHTML = '<span class="error">' + data.error + '</span>';
                }
            } catch (e) {
                document.getElementById('regResult').innerHTML = '<span class="error">Error: ' + e.message + '</span>';
            }
        }

        // Login function - get challenge
        async function login() {
            const username = document.getElementById('loginUsername').value;

            if (!username) {
                document.getElementById('loginResult').innerHTML = '<span class="error">Username required</span>';
                return;
            }

            try {
                const response = await fetch('http://127.0.0.1:5000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });
                const data = await response.json();

                if (response.ok) {
                    currentChallenge = data.challenge;
                    document.getElementById('loginResult').innerHTML = 
                        '<span class="success">Challenge received!</span>\n' +
                        'Challenge: ' + currentChallenge;
                    
                    // Auto-fill verify form
                    document.getElementById('verifyUsername').value = username;
                    document.getElementById('verifyMessage').value = currentChallenge;
                    
                    // Generate signature: SHA256(challenge + secret_key)
                    if (storedSecretKey) {
                        const signature = sha256(currentChallenge + storedSecretKey);
                        document.getElementById('verifySignature').value = signature;
                    }
                } else {
                    document.getElementById('loginResult').innerHTML = '<span class="error">' + data.error + '</span>';
                }
            } catch (e) {
                document.getElementById('loginResult').innerHTML = '<span class="error">Error: ' + e.message + '</span>';
            }
        }

        // Verify function
        async function verify() {
            const username = document.getElementById('verifyUsername').value;
            const message = document.getElementById('verifyMessage').value;
            const signature = document.getElementById('verifySignature').value;

            if (!username || !message || !signature) {
                document.getElementById('verifyResult').innerHTML = '<span class="error">All fields required</span>';
                return;
            }

            try {
                const response = await fetch('http://127.0.0.1:5000/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, message, signature })
                });
                const data = await response.json();

                if (response.ok) {
                    document.getElementById('verifyResult').innerHTML = 
                        '<span class="success">' + data.message + '</span>\n\n' +
                        'Debug Info:\n' +
                        'Challenge: ' + (data.debug?.challenge || '') + '\n' +
                        'Signature: ' + (data.debug?.signature || '') + '\n' +
                        'Public Key: ' + (data.debug?.public_key || '') + '\n' +
                        'Expected: ' + (data.debug?.expected_signature || '') + '\n' +
                        'Result: ' + (data.debug?.result || '');
                } else {
                    document.getElementById('verifyResult').innerHTML = 
                        '<span class="error">' + data.error + '</span>\n\n' +
                        'Debug Info:\n' +
                        'Challenge: ' + (data.debug?.challenge || '') + '\n' +
                        'Signature: ' + (data.debug?.signature || '') + '\n' +
                        'Public Key: ' + (data.debug?.public_key || '') + '\n' +
                        'Expected: ' + (data.debug?.expected_signature || '') + '\n' +
                        'Result: ' + (data.debug?.result || '');
                }
            } catch (e) {
                document.getElementById('verifyResult').innerHTML = '<span class="error">Error: ' + e.message + '</span>';
            }
        }

        // Update stored data display
        function updateStoredData() {
            document.getElementById('storedData').innerHTML = 
                'Secret Key: ' + (storedSecretKey || 'Not set') + '\n' +
                'Public Key: ' + (storedPublicKey || 'Not set');
        }

        // Initialize
        updateStoredData();
    </script>
</body>
</html>
