<!DOCTYPE html>
<html>
<head>
    <title>Quantum Safe Login</title>

    <style>
    body {
        font-family: Arial;
        background: #f4f6f8;
        padding: 40px;
    }

    input, button {
        padding: 10px;
        margin: 5px;
    }

    button {
        background: #4CAF50;
        color: white;
        border: none;
        cursor: pointer;
    }

    button:hover {
        background: #45a049;
    }

    #output {
        margin-top: 20px;
        font-weight: bold;
        white-space: pre-line;
    }
    </style>
</head>

<body>

<h2>🔐 Quantum Safe Login</h2>

<input id="username" placeholder="Enter Username">
<br><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<button onclick="replayAttack()">Replay Attack</button>
<button onclick="compareCrypto()">RSA vs PQC</button>

<p id="output"></p>

<script>

let lastChallenge = "";

// REGISTER
async function register() {
    let username = document.getElementById("username").value;

    let res = await fetch('/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ username })
    });

    let data = await res.json();

    document.getElementById("output").innerText =
        data.message || data.error;
}

// LOGIN
async function login() {
    let username = document.getElementById("username").value;

    let res = await fetch('/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ username })
    });

    let data = await res.json();

    if (data.error) {
        document.getElementById("output").innerText = data.error;
        return;
    }

    let challenge = data.challenge;

    // 🔥 store challenge
    lastChallenge = challenge;

    let verifyRes = await fetch('/verify', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            username: username,
            message: challenge
        })
    });

    let result = await verifyRes.json();

    document.getElementById("output").innerText =
        result.message || result.error;
}

// 🔥 REPLAY ATTACK
async function replayAttack() {
    let username = document.getElementById("username").value;

    if (!lastChallenge) {
        document.getElementById("output").innerText =
            "⚠️ First perform login";
        return;
    }

    let res = await fetch('/verify', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            username: username,
            message: lastChallenge
        })
    });

    let data = await res.json();

    document.getElementById("output").innerText =
        "⚔️ Replay Attack: " + (data.error || data.message);
}

// 🔐 RSA vs PQC EXPLANATION
function compareCrypto() {
    document.getElementById("output").innerText =
        "⚠️ RSA / ECC can be broken by quantum computers (Shor's Algorithm)\n" +
        "✅ PQC (like Dilithium) is quantum-safe and future-proof";
}

</script>

</body>
</html>
