<!DOCTYPE html>
<html>
<head>
    <title>PQC Auth Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        input, button {
            margin: 5px;
            padding: 8px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .box {
            border: 1px solid #444;
            padding: 10px;
            margin-top: 10px;
            background: #1e293b;
        }

        pre {
            color: #22c55e;
        }
    </style>
</head>

<body>

<h1>🔐 PQC Auth Debug Panel</h1>

<div class="box">
    <h3>Register</h3>
    <input id="username" placeholder="username">
    <input id="name" placeholder="name">
    <input id="gender" placeholder="gender">
    <input id="mobile" placeholder="mobile">
    <button onclick="register()">Register</button>
</div>

<div class="box">
    <h3>Login</h3>
    <input id="loginUser" placeholder="username">
    <button onclick="login()">Login</button>
</div>

<div class="box">
    <h3>Actions</h3>
    <button onclick="verify()">Verify</button>
    <button onclick="replayAttack()">Replay Attack</button>
</div>

<div class="box">
    <h3>Live Debug Output</h3>
    <pre id="output"></pre>
</div>

<script>
let challenge = "";
let secret_key = "";
let lastSignature = "";
let usernameValue = "";

// Helper to show output
function showOutput(title, data, isError = false) {
    output.innerHTML = `<b>${title}:</b>\n<pre style='color:${isError ? '#f87171' : '#22c55e'}'>${JSON.stringify(data, null, 2)}</pre>`;
}

// REGISTER
async function register() {
    if (!username.value || !name.value || !gender.value || !mobile.value) {
        showOutput('REGISTER ERROR', {error: 'All fields required'}, true);
        return;
    }
    let res = await fetch("http://127.0.0.1:5000/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: username.value,
            name: name.value,
            gender: gender.value,
            mobile: mobile.value
        })
    });
    let data = await res.json();
    if (data.secret_key) {
        secret_key = data.secret_key;
        usernameValue = username.value;
    }
    showOutput('REGISTER', data, !res.ok);
}

// LOGIN
async function login() {
    if (!loginUser.value) {
        showOutput('LOGIN ERROR', {error: 'Username required'}, true);
        return;
    }
    let res = await fetch("http://127.0.0.1:5000/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: loginUser.value
        })
    });
    let data = await res.json();
    challenge = data.challenge;
    usernameValue = loginUser.value;
    showOutput('LOGIN', data, !res.ok);
}

// SIGN
function signChallenge(challenge, secret_key) {
    return CryptoJS.SHA256(challenge + secret_key).toString();
}

// VERIFY
async function verify() {
    if (!challenge || !secret_key || !usernameValue) {
        showOutput('VERIFY ERROR', {error: 'Register, login, and get challenge first!'}, true);
        return;
    }
    let signature = signChallenge(challenge, secret_key);
    lastSignature = signature;
    let res = await fetch("http://127.0.0.1:5000/verify", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: usernameValue,
            message: challenge,
            signature: signature
        })
    });
    let data = await res.json();
    showOutput('VERIFY', data, !res.ok);
}

// REPLAY ATTACK
async function replayAttack() {
    if (!challenge || !lastSignature || !usernameValue) {
        showOutput('REPLAY ERROR', {error: 'Do a verify first!'}, true);
        return;
    }
    let res = await fetch("http://127.0.0.1:5000/verify", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: usernameValue,
            message: challenge,
            signature: lastSignature
        })
    });
    let data = await res.json();
    showOutput('REPLAY ATTACK', data, !res.ok);
}
</script>

</body>
</html>
